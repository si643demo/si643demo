- title: Projects
  intro: "I develop software and tutorials to help people reduce their screen time."
  cards:
    - title: unplugs.org
      description: "Provides tutorials on how to block any content on any device for yourself or your family."
      tags: # these are optional buttons that appear in the card; you can include links, icons, or both. 
        - label: Homepage
          icon: home
          url: "https://unplugs.org"
          tooltip: "unplugs.org homepage"
        - label: Screen Time
          icon: fruit-apple
          url: "https://unplugs.org/docs/apple/screen-time"
          tooltip: "Apple parental controls"
        - label: Cold Turkey
          icon: "drumstick bite"
          url: "https://unplugs.org/docs/macos/cold-turkey"
          tooltip: "Website and application blocker for computers"
    - title: unplugumich.org
      url: "https://unplugumich.org" # optional: if you want the card to link to the project url when clicked
      description: "Unplug UMich helps students manage screen time and build healthier digital habits."
    - title: Google Search Web Filter
      description: "Redirects your Google searches to the Web filter, which contains text-based links to websites."
      tags:
        - label: Try It
          url: "https://www.google.com/search?q=kajol&udm=14"
          tooltip: "Opens a Web filter Google search for Kajol"
        - label: Chrome
          icon: chrome
          url: "https://chromewebstore.google.com/detail/google-search-web-filter/cnailmoibfjlnlnjedbgbjbononifola"
          tooltip: "Available for Chrome"
        - label: Firefox
          icon: "firefox browser"
          url: "https://addons.mozilla.org/en-US/firefox/addon/google-search-web-filter/"
          tooltip: "Available for Firefox"
    - title: Grayscaler
      description: "Applies a grayscale filter to your included sites, tabs, or all sites, except those you excluded."
      tags:
        - label: Chrome
          icon: chrome
          url: "https://chromewebstore.google.com/detail/grayscaler/lobmgclijfljeodngchmpeafnodanohb"
          tooltip: "Available for Chrome"

